name: Sync dev-master submodule

on:
  repository_dispatch:
    types: [dev-master-updated]

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.DISPATCH_PAT }}

      - name: Update submodule to latest
        run: |
          git submodule update --remote dev-master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Open PR if there are changes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DISPATCH_PAT }}
          commit-message: "chore(deps): bump dev-master submodule"
          branch: chore/bump-dev-master
          title: "chore(deps): sync dev-master submodule"
          body: |
            Auto-generated by the dev-master notify workflow.
            Triggered by commit: ${{ github.event.client_payload.sha }}
          labels: dependencies
